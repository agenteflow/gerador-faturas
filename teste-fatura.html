<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste - Gerador de Faturas MilhasFlow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
    .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin: 10px 0;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
    .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
    .status.loading { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; display: block; }
    .info-box {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 12px;
      color: #666;
      text-align: left;
    }
    .info-box strong { color: #333; display: block; margin-bottom: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gerador de Faturas</h1>
    <p class="subtitle">MilhasFlow - Sistema de PDFs</p>

    <button id="btnGerar" class="btn" onclick="gerarFatura()">
      Gerar Fatura de Teste em PDF
    </button>

    <div id="status" class="status"></div>

    <div class="info-box">
      <strong>Informacoes:</strong>
      Este botao vai gerar uma fatura de exemplo em PDF com o layout identico ao da Ultravel. O PDF sera baixado automaticamente.
    </div>
  </div>

  <script>
    async function gerarFatura() {
      const btn = document.getElementById('btnGerar');
      const status = document.getElementById('status');

      btn.disabled = true;
      status.className = 'status loading';
      status.textContent = 'Gerando PDF... Aguarde alguns segundos...';

      const dadosFatura = {
        empresa: {
          nome: 'Ultravel',
          razaoSocial: 'Ultravel Corporation Turismo Ltda',
          cnpj: '13.387.342/0001-58',
          endereco: 'Rua Santos Saraiva, 238 Loja 07 - Estreito',
          cidade: 'Florianopolis',
          uf: 'SC',
          cep: '88070-101',
          telefone: '',
          website: 'www.ultravel.com.br',
          email: 'fernando.pires@ultravel.com.br',
          logo: ''
        },
        fatura: {
          numero: '28290',
          dataEmissao: '28/10/2025',
          vencimento: '28/10/2025',
          dataGeracaoExtenso: '28 de outubro, 2025 10:23'
        },
        cliente: {
          nome: 'Igreja Batista Palavra Viva',
          endereco: 'Av. Governador Ivo Silveira 2847',
          bairro: 'Capoeiras',
          cidade: 'Florianopolis',
          uf: 'SC',
          cep: '88085-001',
          documento: '01.191.423/0001-07',
          ieRg: '',
          telefone: '(48) 3249-5900',
          email: 'sede@clicpalavraviva.com.br'
        },
        venda: {
          numero: '39362',
          data: '25/10/2025',
          produto: 'Passagem Aerea',
          solicitante: '',
          numeroExterno: '',
          centroCusto: ''
        },
        voo: {
          ciaAerea: 'Azul Linhas Aereas',
          localizador: 'DIYPXC'
        },
        trechos: [
          {
            cia: 'AD',
            voo: '2967',
            classe: 'Q',
            origem: 'FLN Hercilio Luz International Airport - Florianopolis, Santa Catarina, Brazil',
            destino: 'CNF Tancredo Neves International Airport (Confins Int\'l) - Belo Horizonte, Minas Gerais, Brazil',
            saida: 'ter 04/11/2025 05:40',
            chegada: 'ter 04/11/2025 07:25'
          },
          {
            cia: 'AD',
            voo: '8730',
            classe: 'Q',
            origem: 'CNF Tancredo Neves International Airport (Confins Int\'l) - Belo Horizonte, Minas Gerais, Brazil',
            destino: 'MCO Orlando International Airport - Orlando, Florida, United States',
            saida: 'ter 04/11/2025 12:35',
            chegada: 'ter 04/11/2025 19:30'
          }
        ],
        passageiros: [
          {
            nome: 'Willian Andrei de Souza da Rosa',
            bilhete: '5770009211785',
            custoPax: '',
            valor: 3054.96,
            taxas: 0.00,
            descTaxas: 0.00,
            total: 3054.96
          }
        ],
        totais: {
          valor: 3054.96,
          abatimentos: 0.00,
          taxas: 0.00,
          total: 3054.96,
          valorFaturado: 3054.96
        },
        pagamento: {
          banco: 'Nubank - Banco 260/ Agencia 0001/ Conta 74647502 -8',
          titular: 'ULTRAVEL CORPORATION TURISMO LTDA',
          cnpj: '13.387.342/0001-58',
          chavePix: 'pix3@ultravel.com.br',
          emailDuvidas: 'laura.teston@ultravel.com.br'
        }
      };

      try {
        const response = await fetch('http://localhost:3000/gerar-fatura', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dadosFatura)
        });

        if (!response.ok) throw new Error('Erro ao gerar PDF');

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'fatura-' + dadosFatura.fatura.numero + '.pdf';
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);

        status.className = 'status success';
        status.textContent = 'PDF gerado com sucesso! O arquivo foi baixado.';
      } catch (error) {
        console.error('Erro:', error);
        status.className = 'status error';
        status.textContent = 'Erro ao gerar PDF. Verifique se o servidor esta rodando (node server.js).';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
